<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ede8ff">
<title>Training Log — Core & Espalda</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#ede8ff;--s1:#e4ddfb;--s2:#d8d0f4;--s3:#ccc4ec;
  --b1:#b4aad8;--b2:#9890c8;
  --t1:#0e0c18;--t2:#302c58;--t3:#7068a8;
  --A:#6d28d9;--B:#16803d;--C:#b45309;
  --danger:#b91c1c;--ok:#16803d;
  --r:8px;
  --nav-h:56px;
  --topbar-h:52px;
  --stats-h:60px;
}
html{height:100%;background:var(--bg)}
body{
  background:var(--bg);color:var(--t1);
  font-family:'IBM Plex Mono',monospace;
  height:100%;min-height:100vh;
  overflow-x:hidden;
}

/* ── LAYOUT DESKTOP ── */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:var(--topbar-h);
  border-bottom:1px solid var(--b1);background:var(--s1);
  flex-shrink:0;gap:12px;
}
#topbar-title{
  font-family:'Syne',sans-serif;font-size:15px;font-weight:700;
  letter-spacing:0.06em;color:var(--t1);white-space:nowrap;
}
#topbar-title span{color:var(--A)}
#nav{display:flex;gap:4px}
.nav-btn{
  background:none;border:1px solid var(--b1);color:var(--t2);
  font-family:'IBM Plex Mono',monospace;font-size:11px;
  padding:7px 16px;border-radius:4px;cursor:pointer;
  transition:all .15s;letter-spacing:.05em;white-space:nowrap;
}
.nav-btn:hover{border-color:var(--b2);color:var(--t1)}
.nav-btn.active{background:var(--s3);border-color:var(--b2);color:var(--t1)}

#stats-bar{
  display:flex;gap:0;
  border-bottom:1px solid var(--b1);
  flex-shrink:0;overflow-x:auto;
  background:var(--s1);
}
.stat{
  display:flex;flex-direction:column;gap:2px;
  padding:10px 20px;border-right:1px solid var(--b1);
  min-width:fit-content;
}
.stat:last-child{border-right:none}
.stat-val{
  font-family:'Syne',sans-serif;font-size:18px;
  font-weight:700;color:var(--A);line-height:1;
}
.stat-lbl{font-size:9px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;margin-top:3px}

#content{flex:1;overflow-y:auto;padding:24px;padding-bottom:40px}
.view{display:none}.view.active{display:block}

/* ── MOBILE LAYOUT ── */
@media(max-width:768px){
  #app{height:100%;min-height:100vh;padding-bottom:var(--nav-h)}
  #topbar{padding:0 16px;height:var(--topbar-h)}
  #topbar-title{font-size:13px}
  #nav{display:none} /* reemplazado por bottom nav */
  #stats-bar{height:auto}
  .stat{padding:8px 14px}
  .stat-val{font-size:16px}
  .stat-lbl{font-size:8px}
  #content{padding:16px;padding-bottom:calc(var(--nav-h) + 24px);overflow-y:auto;-webkit-overflow-scrolling:touch}

  /* bottom navigation mobile */
  #bottom-nav{
    display:flex;position:fixed;bottom:0;left:0;right:0;
    height:var(--nav-h);background:var(--s1);
    border-top:1px solid var(--b1);z-index:50;
  }
  .bnav-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:4px;background:none;border:none;
    color:var(--t3);font-family:'IBM Plex Mono',monospace;
    font-size:9px;letter-spacing:.05em;cursor:pointer;
    transition:color .15s;padding:8px 4px;
  }
  .bnav-btn.active{color:var(--A)}
  .bnav-icon{font-size:18px;line-height:1}
}
@media(min-width:769px){
  #bottom-nav{display:none}
  #content{height:calc(100vh - var(--topbar-h) - var(--stats-h) - 1px)}
}

/* ── DASHBOARD ── */
.dash-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:16px;margin-bottom:16px;
}
.card{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--r);padding:20px;
}
.card-title{
  font-size:9px;letter-spacing:.15em;text-transform:uppercase;
  color:var(--t3);margin-bottom:14px;
}
.next-session{display:flex;align-items:center;gap:16px}
.session-badge{
  width:56px;height:56px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Syne',sans-serif;font-size:26px;font-weight:800;
  flex-shrink:0;
}
.badge-A{background:rgba(109,40,217,.1);color:var(--A);border:2px solid rgba(109,40,217,.3)}
.badge-B{background:rgba(22,128,61,.1);color:var(--B);border:2px solid rgba(22,128,61,.3)}
.badge-C{background:rgba(180,83,9,.1);color:var(--C);border:2px solid rgba(180,83,9,.3)}
.session-info-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:4px;line-height:1.3}
.session-info-sub{font-size:10px;color:var(--t2);line-height:1.5}
.start-btn{
  margin-top:16px;width:100%;padding:14px;
  font-family:'Syne',sans-serif;font-weight:700;font-size:13px;
  border:none;border-radius:6px;cursor:pointer;
  letter-spacing:.05em;transition:opacity .15s;color:#09090b;
}
.start-btn:hover{opacity:.85}
.start-btn:active{opacity:.7;transform:scale(.98)}
.start-btn{color:#fff}
.start-btn.A{background:var(--A)}
.start-btn.B{background:var(--B)}
.start-btn.C{background:var(--C)}

/* alertas */
.alert-box{border-radius:6px;padding:14px 16px;font-size:12px;line-height:1.6;margin-bottom:12px}
.alert-up{background:rgba(22,128,61,.08);border:1px solid rgba(22,128,61,.25);color:#14532d}
.alert-warn{background:rgba(185,28,28,.08);border:1px solid rgba(185,28,28,.25);color:#7f1d1d}
.alert-info{background:rgba(109,40,217,.08);border:1px solid rgba(109,40,217,.2);color:#3b0764}
.alert-title{
  font-family:'Syne',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:.08em;margin-bottom:6px;text-transform:uppercase;
  display:block;
}

/* mini calendario */
.mini-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:8px}
.mc-day{
  aspect-ratio:1;border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;color:var(--t3);background:var(--s2);
}
.mc-day.done-A{background:rgba(109,40,217,.15);color:var(--A);font-weight:700}
.mc-day.done-B{background:rgba(22,128,61,.15);color:var(--B);font-weight:700}
.mc-day.done-C{background:rgba(180,83,9,.15);color:var(--C);font-weight:700}
.mc-day.today{border:1px solid var(--b2)}

/* prog timeline */
#prog-timeline{overflow-x:auto;padding-bottom:4px}
.prog-phase-row{display:flex;gap:4px;min-width:500px}
.prog-phase-item{
  flex:1;background:var(--s2);border:1px solid var(--b1);
  border-radius:6px;padding:10px 12px;min-width:70px;
}
.prog-phase-item.current{background:rgba(109,40,217,.08);border-color:rgba(109,40,217,.35)}
.prog-phase-item.done-phase{opacity:.5}
.prog-phase-name{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;margin-bottom:2px}
.prog-phase-detail{font-size:9px;color:var(--t3)}
.prog-now{font-size:9px;color:var(--A);margin-top:4px}

/* ── CALENDARIO ── */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.cal-nav-btn{
  background:var(--s2);border:1px solid var(--b1);color:var(--t2);
  width:36px;height:36px;border-radius:4px;cursor:pointer;
  font-size:16px;display:flex;align-items:center;justify-content:center;
}
.cal-nav-btn:hover{border-color:var(--b2);color:var(--t1)}
.cal-month-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700}
.cal-grid-head{
  display:grid;grid-template-columns:repeat(7,1fr);
  gap:3px;margin-bottom:3px;text-align:center;
}
.cal-dow{font-size:9px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;padding:6px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-cell{
  aspect-ratio:1;border-radius:6px;border:1px solid transparent;
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;position:relative;
  background:var(--s1);transition:all .15s;
  cursor:default;min-height:40px;
}
.cal-cell:not(.empty):hover{border-color:var(--b2)}
.cal-cell.today{border-color:var(--b2)}
.cal-cell.has-session{cursor:pointer}
.cal-cell.done-A{background:rgba(109,40,217,.12);border-color:rgba(109,40,217,.4)}
.cal-cell.done-B{background:rgba(22,128,61,.12);border-color:rgba(22,128,61,.4)}
.cal-cell.done-C{background:rgba(180,83,9,.12);border-color:rgba(180,83,9,.4)}
.cal-cell.empty{background:transparent;border:none}
.cal-day-num{font-size:11px;font-weight:500}
.cal-dot{width:5px;height:5px;border-radius:50%;margin-top:3px}
.dot-A{background:var(--A)}.dot-B{background:var(--B)}.dot-C{background:var(--C)}
.cal-session-num{font-size:7px;color:var(--t3);margin-top:1px}
.cal-legend{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--t2)}
.leg-dot{width:10px;height:10px;border-radius:2px}
#cal-session-detail{margin-top:16px}

/* ── SESIÓN ACTIVA ── */
.session-top{display:flex;align-items:baseline;gap:12px;margin-bottom:6px;flex-wrap:wrap}
.session-day-label{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;line-height:1.2}
.session-meta{font-size:11px;color:var(--t2)}

.phase-bar{
  display:flex;gap:6px;margin:14px 0;
  overflow-x:auto;padding-bottom:4px;
  -webkit-overflow-scrolling:touch;
}
.phase-chip{
  padding:5px 12px;border-radius:20px;font-size:10px;
  letter-spacing:.06em;text-transform:uppercase;
  white-space:nowrap;cursor:pointer;border:1px solid transparent;
  transition:opacity .15s;
}
.phase-chip.warmup{background:rgba(180,83,9,.08);color:#92400e;border-color:rgba(180,83,9,.25)}
.phase-chip.main{background:rgba(109,40,217,.1);color:var(--A);border-color:rgba(109,40,217,.3)}
.phase-chip.accessory{background:rgba(22,128,61,.1);color:var(--B);border-color:rgba(22,128,61,.3)}
.phase-chip.core{background:rgba(190,24,93,.08);color:#9d174d;border-color:rgba(190,24,93,.25)}
.phase-chip.stretch{background:rgba(109,40,217,.06);color:#7c3aed;border-color:rgba(109,40,217,.2)}
.phase-chip:not(.active-phase){opacity:.35}

.ex-card{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--r);margin-bottom:8px;overflow:hidden;
  transition:border-color .15s;
}
.ex-card.done{border-color:rgba(109,40,217,.3);background:rgba(109,40,217,.04)}
.ex-card-head{
  display:grid;grid-template-columns:36px 1fr auto;
  align-items:center;gap:10px;padding:14px 14px;cursor:pointer;
}
.ex-card-head:hover{background:var(--s2)}
.ex-card-head:active{background:var(--s3)}
.ex-num-badge{
  width:28px;height:28px;border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;font-weight:700;background:var(--s3);
  color:var(--t2);flex-shrink:0;
}
.ex-num-badge.done-badge{background:rgba(109,40,217,.15);color:var(--A)}
.ex-name{font-size:12px;font-weight:500;margin-bottom:2px;line-height:1.3}
.ex-muscle{font-size:10px;color:var(--t3);line-height:1.3}
.ex-head-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.ex-summary{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}
.tag{font-size:9px;padding:3px 7px;border-radius:3px;white-space:nowrap}
.tag-sets{background:rgba(109,40,217,.1);color:#5b21b6;border:1px solid rgba(109,40,217,.22)}
.tag-reps{background:rgba(22,128,61,.1);color:#166534;border:1px solid rgba(22,128,61,.22)}
.tag-rest{background:rgba(185,28,28,.1);color:#991b1b;border:1px solid rgba(185,28,28,.22)}
.tag-peso{background:rgba(109,40,217,.07);color:#7c3aed;border:1px solid rgba(109,40,217,.15)}
.done-check{
  width:28px;height:28px;border-radius:50%;border:1px solid var(--b2);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;cursor:pointer;transition:all .15s;flex-shrink:0;
}
.done-check:hover,.done-check:active{border-color:var(--A);color:var(--A)}
.done-check.checked{background:rgba(109,40,217,.12);border-color:var(--A);color:var(--A)}

/* mobile: ocultar tags secundarios */
@media(max-width:480px){
  .tag-rest,.tag-reps{display:none}
  .ex-card-head{grid-template-columns:32px 1fr auto;gap:8px;padding:12px}
  .ex-name{font-size:12px}
}

.ex-body{display:none;padding:0 14px 16px 52px;border-top:1px solid var(--b1)}
.ex-body.open{display:block}
@media(max-width:480px){.ex-body{padding-left:14px}}

.detail-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;margin:12px 0}
.detail-box{background:var(--s2);border:1px solid var(--b1);border-radius:6px;padding:10px 12px}
.detail-box label{font-size:9px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:4px}
.detail-box .val{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;color:var(--t1)}
.detail-box .sub{font-size:9px;color:var(--t3);margin-top:2px}

/* peso editable */
.peso-input-wrap{display:flex;align-items:center;gap:6px;margin-top:6px}
.peso-btn{
  background:var(--s3);border:1px solid var(--b1);color:var(--t2);
  width:28px;height:28px;border-radius:4px;cursor:pointer;
  font-size:16px;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;line-height:1;transition:all .15s;
}
.peso-btn:hover,.peso-btn:active{border-color:var(--b2);color:var(--t1)}
.peso-input{
  width:56px;background:var(--s3);border:1px solid var(--b2);
  color:var(--t1);font-family:'IBM Plex Mono',monospace;
  font-size:14px;font-weight:500;text-align:center;
  padding:4px 6px;border-radius:4px;
}
.peso-unit{font-size:11px;color:var(--t3)}

.cue-list{list-style:none;margin-top:10px}
.cue-list li{
  font-size:11px;color:var(--t2);padding:6px 0;
  border-bottom:1px solid var(--b1);display:flex;gap:8px;line-height:1.5;
}
.cue-list li:last-child{border-bottom:none}
.cue-arrow{color:var(--A);flex-shrink:0}
.lumbar-alert{
  background:rgba(185,28,28,.07);border:1px solid rgba(185,28,28,.25);
  border-left:2px solid var(--danger);padding:8px 12px;
  border-radius:4px;font-size:10px;color:#7f1d1d;margin-top:8px;line-height:1.5;
}
.lumbar-alert::before{content:'⚠ LUMBAR — ';color:var(--danger);font-weight:600}

.prog-suggestion{
  background:rgba(109,40,217,.07);border:1px solid rgba(109,40,217,.2);
  border-radius:6px;padding:10px 14px;margin-top:10px;
  font-size:11px;color:#4c1d95;line-height:1.6;
}
.prog-suggestion strong{color:var(--A);display:block;margin-bottom:4px;font-size:10px;letter-spacing:.1em;text-transform:uppercase}

/* sets tracker */
.sets-tracker{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;align-items:center}
.sets-lbl{font-size:10px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase}
.set-dot{
  width:34px;height:34px;border-radius:50%;border:1px solid var(--b2);
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:var(--t3);cursor:pointer;transition:all .15s;
}
.set-dot:hover,.set-dot:active{border-color:var(--A);color:var(--A)}
.set-dot.done-set{background:rgba(109,40,217,.15);border-color:var(--A);color:var(--A);font-weight:700}

#complete-session-btn{
  margin-top:24px;width:100%;padding:16px;
  background:linear-gradient(135deg,rgba(109,40,217,.12),rgba(109,40,217,.04));
  border:1px solid rgba(109,40,217,.35);color:var(--A);
  font-family:'Syne',sans-serif;font-weight:700;font-size:14px;
  letter-spacing:.08em;border-radius:8px;cursor:pointer;transition:all .2s;
}
#complete-session-btn:hover{background:linear-gradient(135deg,rgba(109,40,217,.2),rgba(109,40,217,.08));border-color:var(--A)}
#complete-session-btn:active{transform:scale(.98)}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  display:flex;align-items:flex-end;justify-content:center;
  z-index:100;backdrop-filter:blur(4px);
}
@media(min-width:600px){.modal-overlay{align-items:center}}
.modal-overlay.hidden{display:none}
.modal{
  background:var(--s1);border:1px solid var(--b2);
  border-radius:12px 12px 0 0;padding:24px;
  width:100%;max-width:500px;
  max-height:85vh;overflow-y:auto;
}
@media(min-width:600px){.modal{border-radius:12px;max-height:80vh}}
.modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;margin-bottom:6px}
.modal-sub{font-size:11px;color:var(--t2);margin-bottom:20px;line-height:1.6}
.modal-section{margin-bottom:16px}
.modal-section-title{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--t3);margin-bottom:8px}
.modal-ex-item{background:var(--s2);border-radius:6px;padding:10px 12px;margin-bottom:6px;font-size:12px}
.modal-ex-item .ex-nm{font-weight:500;margin-bottom:4px;font-size:11px}
.modal-ex-item .weight-change{color:var(--A);font-size:12px}
.modal-close{
  width:100%;padding:14px;background:var(--A);color:#fff;
  font-family:'Syne',sans-serif;font-weight:700;font-size:13px;
  border:none;border-radius:6px;cursor:pointer;margin-top:8px;letter-spacing:.05em;
}
.modal-dismiss{
  width:100%;padding:12px;background:none;color:var(--t2);
  font-family:'IBM Plex Mono',monospace;font-size:12px;
  border:1px solid var(--b1);border-radius:6px;cursor:pointer;margin-top:6px;
}
.modal-dismiss:hover{border-color:var(--b2);color:var(--t1)}

/* ── SYNC INDICATOR ── */
#sync-status{
  font-size:9px;color:var(--t3);letter-spacing:.08em;
  display:flex;align-items:center;gap:4px;
  background:var(--s2);border:1px solid var(--b1);
  border-radius:20px;padding:4px 10px;
  transition:all .3s;white-space:nowrap;flex-shrink:0;
}
#sync-dot{width:6px;height:6px;border-radius:50%;background:var(--t3)}
#sync-status.syncing #sync-dot{background:#fbbf24;animation:pulse .8s infinite}
#sync-status.synced #sync-dot{background:#4ade80}
#sync-status.error #sync-dot{background:#f87171}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--s3);border:1px solid var(--b2);border-radius:8px;
  padding:12px 20px;font-size:12px;color:var(--t1);z-index:200;
  opacity:0;transition:all .3s;max-width:300px;text-align:center;
  white-space:nowrap;
}
@media(min-width:769px){#toast{bottom:24px}}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:48px 24px;color:var(--t3)}
.empty-state-icon{font-size:48px;margin-bottom:16px;opacity:.3}
.empty-state-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--t2);margin-bottom:8px}
.empty-state-sub{font-size:12px;line-height:1.6;margin-bottom:24px}
.empty-state-btn{
  background:var(--A);color:#fff;font-family:'Syne',sans-serif;
  font-weight:700;padding:12px 24px;border:none;border-radius:6px;cursor:pointer;font-size:13px;
}

/* scrollbar */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* cal detail card */
.cal-detail-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:16px}
.cal-detail-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:10px}
.cal-weight-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-top:10px}
.cal-weight-item{background:var(--s2);border:1px solid var(--b1);border-radius:6px;padding:10px}
.cal-weight-name{font-size:10px;font-weight:500;margin-bottom:4px;color:var(--t2)}
.cal-weight-val{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}

/* ── PLANES ── */
.plan-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:20px;margin-bottom:16px}
.plan-card-header{display:flex;align-items:center;gap:14px;margin-bottom:4px}
.plan-card-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:3px}
.plan-card-sub{font-size:11px;color:var(--t1);font-weight:500;margin-bottom:2px}
.plan-card-meta{font-size:10px;color:var(--t2);margin-bottom:14px}
.plan-next-badge{display:inline-block;font-size:8px;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border-radius:3px;background:rgba(109,40,217,.1);color:var(--A);border:1px solid rgba(109,40,217,.3);margin-left:6px;vertical-align:middle}
.plan-phase-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin:12px 0 5px;padding-left:2px;border-left:2px solid var(--b2)}
.plan-ex-row{display:flex;align-items:center;gap:10px;padding:7px 2px;border-bottom:1px solid var(--b1)}
.plan-ex-row:last-of-type{border-bottom:none}
.plan-ex-num{font-size:9px;color:var(--t3);width:20px;flex-shrink:0;font-weight:600;text-align:center}
.plan-ex-info{flex:1;min-width:0}
.plan-ex-name{font-size:11px;font-weight:500;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.plan-ex-detail{font-size:9px;color:var(--t3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.plan-ex-tags{display:flex;gap:3px;flex-shrink:0}
.plan-btn-row{display:flex;gap:8px;margin-top:16px}
.plan-start-btn{
  flex:1;padding:11px 8px;background:var(--s3);border:1px solid var(--b2);
  color:var(--t1);font-family:'Syne',sans-serif;font-weight:700;font-size:11px;
  border-radius:6px;cursor:pointer;letter-spacing:.04em;transition:all .15s;
}
.plan-start-btn:hover{background:var(--s2);border-color:var(--A);color:var(--A)}
.plan-log-btn{
  flex:1;padding:11px 8px;background:transparent;
  font-family:'Syne',sans-serif;font-weight:700;font-size:11px;
  border-radius:6px;cursor:pointer;letter-spacing:.04em;transition:opacity .15s;
  border-width:1px;border-style:solid;
}
.plan-log-btn:hover{opacity:.7}
@media(max-width:480px){
  .plan-ex-tags .tag-reps{display:none}
  .plan-btn-row{flex-direction:column}
}
</style>

//  SUPABASE API
// ═══════════════════════════════════════════════════════════════════
async function supaFetch(path, method='GET', body=null){
  if(!USE_SUPABASE) return null;
  const headers={
    'apikey':SUPABASE_KEY,
    'Authorization':'Bearer '+SUPABASE_KEY,
    'Content-Type':'application/json'
  };
  if(method==='POST') headers['Prefer']='return=representation';
  if(method==='PATCH') headers['Prefer']='return=minimal';
  const opts={method,headers};
  if(body) opts.body=JSON.stringify(body);
  const r=await fetch(SUPABASE_URL+'/rest/v1/'+path,opts);
  if(!r.ok){
    const errText=await r.text();
    console.error(`[Supabase] ${method} ${path} → ${r.status}:`,errText);
    throw new Error(errText);
  }
  const text=await r.text();
  return text?JSON.parse(text):null;
}

async function loadFromSupabase(){
  setSyncStatus('syncing','Cargando...');
  try{
    // Cargar pesos actuales
    const weights=await supaFetch('current_weights?select=weights&order=updated_at.desc&limit=1');
    if(weights && weights.length>0) STATE.weights={...weights[0].weights};
    // Cargar sesiones
    const sessions=await supaFetch('sessions?select=*&order=created_at.asc');
    if(sessions) STATE.sessions=sessions.map(s=>({
      date:s.date, dayType:s.day_type,
      sessionNum:s.session_num,
      weights:s.weights, completedExs:s.completed_exs||[]
    }));
    setSyncStatus('synced','Sincronizado');
  }catch(e){
    setSyncStatus('error','Sin conexión');
    console.error('Supabase load error:',e);
  }
}

async function saveSessionToSupabase(session){
  if(!USE_SUPABASE) return;
  setSyncStatus('syncing','Guardando...');
  try{
    await supaFetch('sessions','POST',{
      date:session.date, day_type:session.dayType,
      session_num:session.sessionNum,
      weights:session.weights, completed_exs:session.completedExs
    });
    // Actualizar pesos actuales
    const existing=await supaFetch('current_weights?select=id&limit=1');
    if(existing && existing.length>0){
      await supaFetch('current_weights?id=eq.'+existing[0].id,'PATCH',{weights:STATE.weights,updated_at:new Date().toISOString()});
    }else{
      await supaFetch('current_weights','POST',{weights:STATE.weights});
    }
    setSyncStatus('synced','Guardado ✓');
  }catch(e){
    setSyncStatus('error','Error al guardar');
    console.error('Supabase save error:',e);
    showToast('⚠ Error al guardar en Supabase — abre la consola (F12)');
  }
}

function setSyncStatus(state, text){
  const el=document.getElementById('sync-status');
  const dot=document.getElementById('sync-dot');
  const txt=document.getElementById('sync-text');
  el.className=state;
  txt.textContent=text;
}

//  HELPERS

function dateKey(d){return d.toISOString().slice(0,10)}
function todayKey(){return dateKey(new Date())}
function getNextDay(){return ORDER[STATE.sessions.length%ORDER.length]}
function getSessionNum(){return STATE.sessions.length+1}
function getPhase(n){return PHASES.find(p=>n>=p.sessions[0]&&n<=p.sessions[1])||PHASES[0]}
function getSemana(){return Math.ceil(getSessionNum()/3)}
function getRacha(){
  const now=new Date(),mon=new Date(now);
  mon.setDate(now.getDate()-((now.getDay()+6)%7));mon.setHours(0,0,0,0);
  return STATE.sessions.filter(s=>new Date(s.date)>=mon).length;
}
function findEx(id){
  for(const d of['A','B','C']){const ex=SESSIONS[d].exercises.find(e=>e.id===id);if(ex)return ex;}
}

function shouldIncreaseWeight(pesoKey,dayType){
  const sameDay=STATE.sessions.filter(s=>s.dayType===dayType);
  if(sameDay.length<2)return false;
  return sameDay.slice(-2).every(s=>s.completedExs&&s.completedExs.includes(pesoKey));
}

function getWeightSuggestions(dayType){
  return SESSIONS[dayType].exercises
    .filter(ex=>ex.isPeso)
    .map(ex=>{
      const cur=STATE.weights[ex.pesoKey]||ex.pesoInicio;
      const shouldUp=shouldIncreaseWeight(ex.pesoKey,dayType)&&cur<ex.pesoObj;
      const inc=cur>=30?5:2.5;
      return{ex,cur,shouldUp,newPeso:shouldUp?cur+inc:cur,maxReached:cur>=ex.pesoObj};
    });
}

let calYear,calMonth;
function initCal(){const n=new Date();calYear=n.getFullYear();calMonth=n.getMonth();}
initCal();
function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();}

function renderCalendar(){
  const months=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  document.getElementById('cal-month-title').textContent=`${months[calMonth]} ${calYear}`;
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const offset=(firstDay+6)%7;
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  let html='';
  for(let i=0;i<offset;i++)html+=`<div class="cal-cell empty"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const k=dateKey(new Date(calYear,calMonth,d));
    const isToday=k===todayKey();
    const sess=STATE.sessions.find(s=>s.date===k);
    const cls=sess?` done-${sess.dayType} has-session`:'';
    const tc=isToday?' today':'';
    html+=`<div class="cal-cell${cls}${tc}" onclick="calCellClick('${k}')">
      <span class="cal-day-num" style="color:${isToday?'var(--A)':'inherit'}">${d}</span>
      ${sess?`<div class="cal-dot dot-${sess.dayType}"></div><div class="cal-session-num">#${sess.sessionNum}</div>`:''}
    </div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
  document.getElementById('cal-session-detail').innerHTML='';
}

function calCellClick(k){
  const sess=STATE.sessions.find(s=>s.date===k);
  if(!sess)return;
  const sd=SESSIONS[sess.dayType];
  const color=sess.dayType==='A'?'var(--A)':sess.dayType==='B'?'var(--B)':'var(--C)';
  const pesoExs=sd.exercises.filter(e=>e.isPeso);
  document.getElementById('cal-session-detail').innerHTML=`
    <div class="cal-detail-card">
      <div class="cal-detail-title" style="color:${color}">

      </div>

      <div style="font-size:11px;color:var(--t3);margin-bottom:10px">

      </div>

function startSession(dayType){
  STATE.activeDay=dayType||getNextDay();
  STATE.activeSessionData={
    completedExs:new Set(),
    setsDone:{},
    weights:{...STATE.weights}
  };
  const sugg=getWeightSuggestions(STATE.activeDay).filter(s=>s.shouldUp);
  sugg.forEach(s=>{STATE.activeSessionData.weights[s.ex.pesoKey]=s.newPeso;});
  goView('session');
}

function renderSession(){
  const sv=document.getElementById('session-view');
  if(!STATE.activeDay){
    sv.innerHTML=`<div class="empty-state">
      <div class="empty-state-icon">◎</div>
      <div class="empty-state-title">Sin sesión activa</div>
      <div class="empty-state-sub">Ve al Dashboard e inicia la próxima sesión para comenzar a entrenar.</div>
      <button class="empty-state-btn" onclick="goView('dashboard')">Ir al Dashboard</button>
    </div>`;return;
  }

  const dayType=STATE.activeDay,sd=SESSIONS[dayType];
  const sesNum=getSessionNum(),phase=getPhase(sesNum);
  const color=dayType==='A'?'var(--A)':dayType==='B'?'var(--B)':'var(--C)';
  const sugg=getWeightSuggestions(dayType).filter(s=>s.shouldUp);

  let alertHtml='';
  if(sugg.length>0){
    alertHtml=`<div class="alert-box alert-up" style="margin-bottom:12px">
      <span class="alert-title">↑ Pesos actualizados por progresión</span>
      ${sugg.map(s=>`· ${s.ex.name.length>35?s.ex.name.slice(0,35)+'…':s.ex.name}: <strong>${s.cur} → ${s.newPeso} kg</strong>`).join('<br>')}
    </div>`;
  }

  const phaseBar=sd.phases.map(p=>
    `<div class="phase-chip ${p.cls} active-phase" onclick="scrollToPhase('${p.id}')">${p.name}</div>`
  ).join('');

  const exHtml=sd.exercises.map(ex=>{
    const w=STATE.activeSessionData.weights[ex.pesoKey]||ex.pesoInicio;
    const isDone=STATE.activeSessionData.completedExs.has(ex.pesoKey||ex.id);
    const setsDone=STATE.activeSessionData.setsDone[ex.id]||0;
    const suggThis=sugg.find(s=>s.ex.id===ex.id);

    const setsHtml=ex.sets>1?`
      <div class="sets-tracker">
        <span class="sets-lbl">Series:</span>
        ${Array.from({length:ex.sets},(_,i)=>`
          <div class="set-dot ${i<setsDone?'done-set':''}" onclick="toggleSet('${ex.id}',${i},${ex.sets})">${i<setsDone?'✓':i+1}</div>
        `).join('')}
      </div>`:'';

    const pesoHtml=ex.isPeso?`
      <div class="detail-box">
        <label>Peso actual</label>
        <div class="peso-input-wrap">
          <button class="peso-btn" onclick="adjustPeso('${ex.pesoKey}',-2.5)">−</button>
          <input class="peso-input" id="peso-${ex.pesoKey}" type="number" value="${w}" step="2.5" min="0" onchange="setPeso('${ex.pesoKey}',this.value)">
          <span class="peso-unit">kg</span>
          <button class="peso-btn" onclick="adjustPeso('${ex.pesoKey}',2.5)">+</button>
        </div>
        <div class="sub" style="margin-top:4px;font-size:9px;color:var(--t3)">Obj: ${ex.pesoObj} kg</div>
      </div>`:`<div class="detail-box"><label>Carga</label><div class="val">—</div><div class="sub">Peso corporal / banda</div></div>`;

    return`<div class="ex-card${isDone?' done':''}" id="excard-${ex.id}" data-phase="${ex.phase}">
      <div class="ex-card-head" onclick="toggleExCard('${ex.id}')">
        <div class="ex-num-badge${isDone?' done-badge':''}">${isDone?'✓':ex.num}</div>
        <div>
          <div class="ex-name">${ex.name}</div>
          <div class="ex-muscle">${ex.muscle}</div>
        </div>
        <div class="ex-head-right">
          <div class="ex-summary">
            <span class="tag tag-sets">${ex.sets} ser.</span>
            <span class="tag tag-reps">${ex.reps}</span>
            <span class="tag tag-rest">${ex.rest}</span>
            ${ex.isPeso?`<span class="tag tag-peso">${w} kg</span>`:''}
          </div>
          <div class="done-check ${isDone?'checked':''}" onclick="event.stopPropagation();toggleExDone('${ex.id}','${ex.pesoKey||ex.id}')">${isDone?'✓':'○'}</div>
        </div>
      </div>
      <div class="ex-body" id="exbody-${ex.id}">

          <div class="detail-box"><label>Series</label><div class="val">${ex.sets}</div></div>

        ${ex.lumbar?`<div class="lumbar-alert">${ex.lumbar}</div>`:''}

  }).join('');

  sv.innerHTML=`

      <div class="session-meta">${sd.sub} · ${phase.name}</div>
    </div>
    ${alertHtml}

    <div id="ex-list">${exHtml}</div>
    <button id="complete-session-btn" onclick="completeSession()">✓ Completar sesión</button>`;
}

function toggleExCard(id){
  const body=document.getElementById('exbody-'+id);
  if(body)body.classList.toggle('open');
}

function toggleExDone(exId,pesoKey){
  const key=pesoKey||exId;
  if(STATE.activeSessionData.completedExs.has(key)){
    STATE.activeSessionData.completedExs.delete(key);
  }else{
    STATE.activeSessionData.completedExs.add(key);
    const ex=findEx(exId);
    if(ex)STATE.activeSessionData.setsDone[exId]=ex.sets;
  }
  renderSession();
}

function toggleSet(exId,idx){
  const cur=STATE.activeSessionData.setsDone[exId]||0;
  STATE.activeSessionData.setsDone[exId]=idx<cur?idx:idx+1;
  renderSession();
}

function adjustPeso(key,delta){
  const cur=STATE.activeSessionData.weights[key]||STATE.weights[key]||0;
  const nv=Math.max(0,Math.round((cur+delta)*2)/2);
  STATE.activeSessionData.weights[key]=nv;
  const inp=document.getElementById('peso-'+key);
  if(inp)inp.value=nv;
  const dayType=STATE.activeDay;
  const ex=SESSIONS[dayType].exercises.find(e=>e.pesoKey===key);
  if(ex){
    const card=document.getElementById('excard-'+ex.id);
    if(card){const tag=card.querySelector('.tag-peso');if(tag)tag.textContent=nv+' kg';}
  }
}

function setPeso(key,val){
  STATE.activeSessionData.weights[key]=Math.max(0,parseFloat(val)||0);
}

function scrollToPhase(pid){
  const first=document.querySelector(`[data-phase="${pid}"]`);
  if(first)first.scrollIntoView({behavior:'smooth',block:'start'});
}

// ═══════════════════════════════════════════════════════════════════
//  COMPLETAR SESIÓN
// ═══════════════════════════════════════════════════════════════════
async function completeSession(){
  const dayType=STATE.activeDay;
  if(!dayType)return;
  const sesNum=getSessionNum(),sd=SESSIONS[dayType];
  const weights={...STATE.activeSessionData.weights};
  const completedExs=[...STATE.activeSessionData.completedExs];

  const session={date:todayKey(),dayType,sessionNum:sesNum,weights,completedExs};
  STATE.sessions.push(session);
  Object.assign(STATE.weights,weights);

  // Guardar en Supabase
  await saveSessionToSupabase(session);

  // Modal
  const nextSesNum=sesNum+1,nextDay=getNextDay();
  const nextPhase=getPhase(nextSesNum),curPhase=getPhase(sesNum);
  const phaseChange=nextPhase.name!==curPhase.name;
  const ups=getWeightSuggestions(nextDay).filter(s=>s.shouldUp);
  const doneCount=sd.exercises.filter(ex=>completedExs.includes(ex.pesoKey||ex.id)).length;
  const pesoExs=sd.exercises.filter(e=>e.isPeso);

  let body=`<div class="modal-section">
    <div class="modal-section-title">Ejercicios completados</div>
    <div style="font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--A)">${doneCount}<span style="font-size:16px;color:var(--t3)"> / ${sd.exercises.length}</span></div>
  </div>`;

  if(pesoExs.length>0){
    body+=`<div class="modal-section">
      <div class="modal-section-title">Pesos registrados</div>
      ${pesoExs.map(ex=>{
        const w=weights[ex.pesoKey]||ex.pesoInicio;
        const prevSess=STATE.sessions.slice(0,-1).filter(s=>s.dayType===dayType).slice(-1)[0];
        const prev=prevSess?.weights?.[ex.pesoKey];
        const diff=prev!==undefined&&w>prev?`<span style="color:var(--A)"> ↑ +${w-prev}kg</span>`:'';
        return`<div class="modal-ex-item"><div class="ex-nm">${ex.name.length>40?ex.name.slice(0,40)+'…':ex.name}</div><div class="weight-change">${w} kg${diff}</div></div>`;
      }).join('')}
    </div>`;
  }

  if(phaseChange){
    body+=`<div class="alert-box alert-info" style="margin-bottom:12px">
      <span class="alert-title">Nueva fase: ${nextPhase.name}</span>
      Semana ${nextPhase.weeks} · ${nextPhase.reps} · ${nextPhase.intensity}
    </div>`;
  }

  if(ups.length>0){
    body+=`<div class="modal-section">
      <div class="modal-section-title">↑ Subir peso próxima sesión (Día ${nextDay})</div>
      ${ups.map(s=>`<div class="modal-ex-item"><div class="ex-nm">${s.ex.name.length>40?s.ex.name.slice(0,40)+'…':s.ex.name}</div><div class="weight-change">${s.cur} kg → ${s.newPeso} kg (+${s.newPeso-s.cur} kg)</div></div>`).join('')}
    </div>`;
  }

  const isDeload=PHASES.filter(p=>p.name==='Deload').some(p=>nextSesNum>=p.sessions[0]&&nextSesNum<=p.sessions[1]);
  if(isDeload){
    body+=`<div class="alert-box alert-warn" style="margin-bottom:12px">
      <span class="alert-title">⚠ Semana de Deload</span>
      Reduce todas las cargas un 30% y el volumen a 2–3 series. Obligatorio para proteger la L5-S1.
    </div>`;
  }

  document.getElementById('modal-title').textContent=`✓ Sesión #${sesNum} — Día ${dayType} completada`;
  document.getElementById('modal-sub').textContent=`${todayKey()} · ${sd.title}`;
  document.getElementById('modal-body').innerHTML=body;
  document.getElementById('modal').classList.remove('hidden');

  STATE.activeDay=null;
  STATE.activeSessionData=null;
}

function closeModal(){
  document.getElementById('modal').classList.add('hidden');
  goView('dashboard');
  showToast('Sesión guardada ✓');
}

// ═══════════════════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════════════════
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ═══════════════════════════════════════════════════════════════════
//  PLANES
// ═══════════════════════════════════════════════════════════════════
function renderPlanes(){
  const nextDay=getNextDay();
  document.getElementById('planes-view').innerHTML=['A','B','C'].map(dayType=>{
    const sd=SESSIONS[dayType];
    const color=dayType==='A'?'var(--A)':dayType==='B'?'var(--B)':'var(--C)';
    const isNext=dayType===nextDay;

    const byPhase={};
    sd.exercises.forEach(ex=>{
      if(!byPhase[ex.phase])byPhase[ex.phase]=[];
      byPhase[ex.phase].push(ex);
    });

    const exHtml=sd.phases.map(phase=>{
      const exs=byPhase[phase.id]||[];
      if(!exs.length)return'';
      return`<div class="plan-phase-label">${phase.name}</div>`+
        exs.map(ex=>{
          const w=STATE.weights[ex.pesoKey]||ex.pesoInicio;
          return`<div class="plan-ex-row">
            <div class="plan-ex-num">${ex.num}</div>
            <div class="plan-ex-info">
              <div class="plan-ex-name">${ex.name}</div>
              <div class="plan-ex-detail">${ex.muscle}</div>
            </div>
            <div class="plan-ex-tags">
              <span class="tag tag-sets">${ex.sets}×</span>
              <span class="tag tag-reps">${ex.reps}</span>
              ${ex.isPeso?`<span class="tag tag-peso">${w} kg</span>`:''}
            </div>
          </div>`;
        }).join('');
    }).join('');

    return`<div class="plan-card">
      <div class="plan-card-header">
        <div class="session-badge badge-${dayType}">${dayType}</div>
        <div>
          <div class="plan-card-title" style="color:${color}">
            ${sd.label}${isNext?'<span class="plan-next-badge">PRÓXIMA</span>':''}
          </div>
          <div class="plan-card-sub">${sd.title}</div>
        </div>
      </div>
      <div class="plan-card-meta">${sd.sub} &nbsp;·&nbsp; ${sd.exercises.length} ejercicios</div>
      ${exHtml}
      <div class="plan-btn-row">
        <button class="plan-start-btn" onclick="startSession('${dayType}')">▶ Iniciar ahora</button>
        <button class="plan-log-btn" style="border-color:${color};color:${color}" onclick="logPlanAsSession('${dayType}')">✓ Marcar como hecho hoy</button>
      </div>
    </div>`;
  }).join('');
}

async function logPlanAsSession(dayType){
  const today=todayKey();
  const existing=STATE.sessions.find(s=>s.date===today);
  if(existing){
    showToast('Ya hay una sesión registrada hoy');
    return;
  }
  const sesNum=getSessionNum();
  const weights={...STATE.weights};
  const session={date:today,dayType,sessionNum:sesNum,weights,completedExs:[]};
  STATE.sessions.push(session);
  Object.assign(STATE.weights,weights);
  await saveSessionToSupabase(session);
  showToast(`Día ${dayType} — Sesión #${sesNum} guardada ✓`);
  renderPlanes();
}

// ═══════════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════════
async function init(){
  initWeights();
  if(USE_SUPABASE){
    await loadFromSupabase();
  }else{
    setSyncStatus('error','Sin Supabase');
  }
  renderDashboard();
  updateStats();
}

init();
</script>
